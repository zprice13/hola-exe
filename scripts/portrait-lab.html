<script>
const STYLES = [
  { key: 'halftone',  label: 'HALFTONE — classic dither ramp',      ramp: ' .:-=+*#%@',            gamma: 1.0 },
  { key: 'currency',  label: 'TERMINAL DUMP — $#+ ramp, hard steps', ramp: ' .+*#$@',               gamma: 1.15 },
  { key: 'typewriter',label: 'TYPEWRITER — dots & ticks, airy',      ramp: ' .,:;!()|/#',           gamma: 0.8 },
  { key: 'blocks',    label: 'CRT BLOCKS — ░▒▓█ shading',            ramp: ' ░▒▓█',                 gamma: 1.0 },
]
const CHARS = ['rosana', 'leo']
const MAIN_COLS = 44
const SIZES = [30, 44, 60]

function toAscii(imageData, cols, ramp, gamma) {
  const { width, height, data } = imageData
  const cellW = width / cols
  const cellH = cellW * 2.05 // account for character aspect
  const rows = Math.floor(height / cellH)
  let out = ''
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      // average brightness of the cell
      let sum = 0, n = 0
      const x0 = Math.floor(c * cellW), x1 = Math.min(width, Math.ceil((c + 1) * cellW))
      const y0 = Math.floor(r * cellH), y1 = Math.min(height, Math.ceil((r + 1) * cellH))
      for (let y = y0; y < y1; y += 2) {
        for (let x = x0; x < x1; x += 2) {
          const i = (y * width + x) * 4
          sum += 0.2126 * data[i] + 0.7152 * data[i + 1] + 0.0722 * data[i + 2]
          n++
        }
      }
      const lum = Math.pow(sum / n / 255, gamma)
      const idx = Math.min(ramp.length - 1, Math.round(lum * (ramp.length - 1)))
      out += ramp[idx]
    }
    out += '\n'
  }
  return out
}

async function svgToImageData(svgEl) {
  const xml = new XMLSerializer().serializeToString(svgEl)
  const img = new Image()
  img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(xml)))
  await new Promise((res) => { img.onload = res })
  const canvas = document.createElement('canvas')
  canvas.width = svgEl.width.baseVal.value
  canvas.height = svgEl.height.baseVal.value
  const ctx = canvas.getContext('2d')
  ctx.drawImage(img, 0, 0)
  return ctx.getImageData(0, 0, canvas.width, canvas.height)
}

async function main() {
  const imgs = {}
  for (const c of CHARS) imgs[c] = await svgToImageData(document.getElementById('src-' + c))
  const out = document.getElementById('out')
  out.innerHTML = ''

  for (const style of STYLES) {
    const h = document.createElement('h2')
    h.textContent = `STYLE: ${style.label}`
    out.appendChild(h)
    const row = document.createElement('div')
    row.className = 'row'
    for (const c of CHARS) {
      const cell = document.createElement('div')
      cell.className = 'cell ' + c
      const pre = document.createElement('pre')
      pre.style.fontSize = '9px'
      pre.style.lineHeight = '1.0'
      pre.textContent = toAscii(imgs[c], MAIN_COLS, style.ramp, style.gamma)
      const nm = document.createElement('span'); nm.className = 'nm'; nm.textContent = c.toUpperCase()
      const meta = document.createElement('span'); meta.className = 'meta'; meta.textContent = `${MAIN_COLS} cols`
      cell.append(pre, nm, meta)
      row.appendChild(cell)
    }
    out.appendChild(row)
  }

  // resolution ladder for the halftone style, Rosana only
  const h = document.createElement('h2')
  h.textContent = 'RESOLUTION LADDER (halftone, Rosana): complexity vs size'
  out.appendChild(h)
  const row = document.createElement('div')
  row.className = 'row'
  for (const cols of SIZES) {
    const cell = document.createElement('div')
    cell.className = 'cell rosana'
    const pre = document.createElement('pre')
    pre.style.fontSize = cols > 50 ? '7px' : '9px'
    pre.style.lineHeight = '1.0'
    pre.textContent = toAscii(imgs.rosana, cols, STYLES[0].ramp, STYLES[0].gamma)
    const meta = document.createElement('span'); meta.className = 'meta'
    meta.textContent = `${cols} cols ≈ ${cols * Math.floor(400 / (360 / cols) / 2.05)} chars`
    cell.append(pre, meta)
    row.appendChild(cell)
  }
  out.appendChild(row)
  document.title = 'READY'
}
main()
</script>
